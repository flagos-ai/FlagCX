name: Build RPM Packages

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'flagcx/**'
      - 'packaging/rpm/**'
      - '.github/workflows/build-rpm.yml'
  workflow_dispatch:

jobs:
  build-rpm-packages:
    runs-on: h20

    strategy:
      fail-fast: false
      matrix:
        backend: [nvidia, metax, ascend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ${{ matrix.backend }} RPM packages
        run: ./packaging/rpm/build-flagcx-rpm.sh ${{ matrix.backend }}

      - name: Upload ${{ matrix.backend }} RPM packages
        uses: actions/upload-artifact@v4
        with:
          name: flagcx-${{ matrix.backend }}-rpm-packages
          path: rpm-packages/${{ matrix.backend }}/**/*.rpm
          retention-days: 7

  upload-rpm-to-nexus:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-rpm-packages
    runs-on: h20

    steps:
      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flagcx-*-rpm-packages
          path: packages/

      - name: List downloaded RPM packages
        run: |
          echo "Downloaded RPM packages:"
          find packages/ -name "*.rpm" -exec ls -lh {} \;

      - name: Upload RPM packages to Nexus YUM repository
        env:
          NEXUS_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.CONTAINER_REGISTRY }}
          NEXUS_REPO_URL: https://resource.flagos.net/repository/flagos-yum-hosted
        run: |
          set -euo pipefail

          upload_rpm() {
            local rpm_file="$1"
            local filename
            local artifact_dir
            local backend
            local repo_path
            local parent_dir

            filename="$(basename "$rpm_file")"
            artifact_dir="${rpm_file#packages/}"
            artifact_dir="${artifact_dir%%/*}"
            backend="${artifact_dir#flagcx-}"
            backend="${backend%-rpm-packages}"
            parent_dir="$(basename "$(dirname "$rpm_file")")"

            if [[ "$rpm_file" == *"/SRPMS/"* ]]; then
              repo_path="SRPMS/${backend}/${filename}"
            elif [[ "$rpm_file" == *"/RPMS/"* ]]; then
              repo_path="${backend}/${parent_dir}/${filename}"
            else
              repo_path="${backend}/${filename}"
            fi

            echo "Uploading: ${filename}"
            echo "  Backend: ${backend}"
            echo "  Repository path: ${repo_path}"

            curl -f -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
              --upload-file "$rpm_file" \
              "${NEXUS_REPO_URL}/${repo_path}"
          }

          uploaded=0
          while IFS= read -r -d '' rpm_file; do
            upload_rpm "$rpm_file"
            uploaded=$((uploaded + 1))
          done < <(find packages/ -name "*.rpm" -print0)

          if [ "$uploaded" -eq 0 ]; then
            echo "No RPM packages found to upload"
            exit 1
          fi

          echo "Uploaded ${uploaded} RPM package(s) to Nexus"
